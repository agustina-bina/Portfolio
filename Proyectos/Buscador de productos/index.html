<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketFinder - Buscador de Productos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1 class="logo">Market<span>Finder</span></h1>
      <p class="tagline">Encuentra rápidamente los productos que estás buscando.</p>
    </div>
  </header>

  <main class="main-container">
    <section class="search-section">
      <div class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Buscar productos..."
          autocomplete="off"
        >
        <button id="clearSearch" class="clear-btn" aria-label="Limpiar búsqueda">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
    </section>

    <div class="content-wrapper">
      <aside class="filters-sidebar">
        <div class="filters-header">
          <h2>Filtros</h2>
          <button id="clearFilters" class="clear-filters-btn">Limpiar</button>
        </div>

        <div class="filter-group">
          <h3 class="filter-title">Categoría</h3>
          <div class="filter-options" id="categoryFilters">
            <!-- Categories will be populated dynamically -->
          </div>
        </div>

        <div class="filter-group">
          <h3 class="filter-title">Precio</h3>
          <div class="filter-options" id="priceFilters">
            <label class="filter-option">
              <input type="checkbox" name="price" value="0-50">
              <span class="checkmark"></span>
              <span class="filter-label">Menos de $50</span>
            </label>
            <label class="filter-option">
              <input type="checkbox" name="price" value="50-100">
              <span class="checkmark"></span>
              <span class="filter-label">$50 – $100</span>
            </label>
            <label class="filter-option">
              <input type="checkbox" name="price" value="100+">
              <span class="checkmark"></span>
              <span class="filter-label">Más de $100</span>
            </label>
          </div>
        </div>
      </aside>

      <section class="results-section">
        <div class="results-header">
          <p class="results-count" id="resultsCount">Cargando productos...</p>
        </div>
        <div class="products-grid" id="productsGrid">
          <!-- Products will be populated dynamically -->
        </div>
        <div class="no-results" id="noResults" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
            <path d="M8 8l6 6"></path>
            <path d="M14 8l-6 6"></path>
          </svg>
          <h3>No se encontraron productos</h3>
          <p>Intenta con otros términos de búsqueda o ajusta los filtros.</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <p>MarketFinder - Tu buscador de productos favorito</p>
  </footer>

  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
